<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Nicole</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0d13;
    --surface: #13161f;
    --border: rgba(255,255,255,0.06);
    --muted: rgba(255,255,255,0.35);
    --hint: rgba(255,255,255,0.18);
    --prata-color: #7ab8f5;
    --prata-bg: rgba(55,138,221,0.14);
    --prata-border: rgba(55,138,221,0.5);
    --bronze-color: #f5c842;
    --bronze-bg: rgba(220,160,20,0.14);
    --bronze-border: rgba(220,160,20,0.5);
    --ouro-color: #FFD700;
    --ouro-bg: rgba(255,215,0,0.14);
    --ouro-border: rgba(255,215,0,0.5);
    --platina-color: #e8e8f0;
    --platina-bg: rgba(200,200,220,0.14);
    --platina-border: rgba(200,200,220,0.5);
    --fora-color: #f08080;
    --fora-bg: rgba(220,70,70,0.12);
    --fora-border: rgba(220,70,70,0.22);
  }
  html, body {
    width: 100%; height: 100%;
    margin: 0; padding: 0;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: #f0f0f0;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .layout {
    display: grid;
    grid-template-columns: 180px 1fr;
    width: 100vw; height: 100vh;
  }
  .sidebar {
    background: var(--surface);
    border-right: 0.5px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 16px;
    gap: 12px;
  }
  .avatar {
    width: 110px; height: 110px;
    border-radius: 50%; object-fit: cover;
    border: 3px solid rgba(255,255,255,0.1);
  }
  .sidebar-name { font-size: 17px; font-weight: 500; text-align: center; letter-spacing: -0.02em; }
  .sidebar-role { font-size: 10px; color: var(--muted); text-align: center; line-height: 1.5; }
  .sidebar-divider { width: 28px; height: 0.5px; background: var(--border); }
  .sidebar-period { font-size: 10px; color: var(--hint); text-align: center; line-height: 1.8; }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #4caf7d; display: inline-block; margin-right: 4px;
    box-shadow: 0 0 5px rgba(76,175,125,0.6);
  }
  .content {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 10px;
    padding: 14px 16px;
    height: 100vh;
    overflow: hidden;
  }
  .section-label {
    font-size: 8px; font-weight: 500;
    letter-spacing: .1em; color: var(--hint);
    margin-bottom: 6px;
  }
  .total-card {
    grid-column: 1 / 3;
    grid-row: 1;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    position: relative;
    overflow: hidden;
  }
  .total-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .total-card.bronze { background: rgba(220,160,20,0.07);  border: 1.5px solid var(--bronze-border); }
  .total-card.bronze::before { background: linear-gradient(90deg, transparent, var(--bronze-color), transparent); }
  .total-card.prata  { background: rgba(55,138,221,0.08);  border: 1.5px solid var(--prata-border); }
  .total-card.prata::before  { background: linear-gradient(90deg, transparent, var(--prata-color), transparent); }
  .total-card.ouro   { background: rgba(255,215,0,0.08);   border: 1.5px solid var(--ouro-border); }
  .total-card.ouro::before   { background: linear-gradient(90deg, transparent, var(--ouro-color), transparent); }
  .total-card.platina{ background: rgba(200,200,220,0.08); border: 1.5px solid var(--platina-border); }
  .total-card.platina::before{ background: linear-gradient(90deg, transparent, var(--platina-color), transparent); }
  .total-card.fora   { border: 0.5px solid rgba(240,128,128,0.15); }
  .total-left { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
  .total-label { font-size: 9px; font-weight: 500; letter-spacing: .1em; color: var(--muted); }
  .total-value {
    font-size: 64px; font-weight: 300;
    letter-spacing: -0.04em; line-height: 1;
    font-family: 'DM Mono', monospace;
  }
  .medal-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 500;
    padding: 4px 12px; border-radius: 20px; width: fit-content;
  }
  .medal-badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; }
  .bronze-b { background: var(--bronze-bg); color: var(--bronze-color); border: 0.5px solid var(--bronze-border); }
  .bronze-b::before { background: var(--bronze-color); }
  .prata-b  { background: var(--prata-bg);  color: var(--prata-color);  border: 0.5px solid var(--prata-border); }
  .prata-b::before  { background: var(--prata-color); }
  .ouro-b   { background: var(--ouro-bg);   color: var(--ouro-color);   border: 0.5px solid var(--ouro-border); }
  .ouro-b::before   { background: var(--ouro-color); }
  .platina-b{ background: var(--platina-bg);color: var(--platina-color);border: 0.5px solid var(--platina-border); }
  .platina-b::before{ background: var(--platina-color); }
  .fora-b   { background: var(--fora-bg);   color: var(--fora-color);   border: 0.5px solid var(--fora-border); }
  .fora-b::before   { background: var(--fora-color); }
  .total-right { flex: 1; }
  .progress-track {
    width: 100%; height: 8px; border-radius: 4px;
    display: flex; overflow: hidden; position: relative; margin-bottom: 5px;
  }
  .p-fora    { background: rgba(255,255,255,0.06); }
  .p-bronze  { background: rgba(220,160,20,0.4); }
  .p-prata   { background: rgba(55,138,221,0.45); }
  .p-ouro    { background: rgba(255,215,0,0.5); }
  .p-platina { background: rgba(200,200,220,0.5); }
  .p-marker {
    position: absolute; top: -3px;
    width: 3px; height: 14px;
    background: #fff; border-radius: 2px;
    transform: translateX(-50%);
    box-shadow: 0 0 5px rgba(255,255,255,0.4);
  }
  .progress-ticks { display: flex; justify-content: space-between; }
  .ptick { font-size: 9px; color: var(--hint); }
  .metas-card {
    grid-column: 1;
    grid-row: 2;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
  }
  .arc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; flex: 1; margin-top: 4px; }
  .arc-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .arc-svg { width: 100%; max-width: 110px; }
  .arc-value { font-size: 18px; font-weight: 400; font-family: 'DM Mono', monospace; }
  .arc-label { font-size: 9px; color: var(--muted); text-align: center; }
  .arc-sub   { font-size: 9px; color: var(--hint); text-align: center; }
  .produtos-card {
    grid-column: 2;
    grid-row: 2;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .produto-list {
    flex: 1; overflow: hidden;
    display: flex; flex-direction: column; gap: 1px;
    margin-top: 4px;
  }
  .produto-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 3px 6px; border-radius: 4px; font-size: 11px;
  }
  .produto-row:nth-child(odd) { background: rgba(255,255,255,0.03); }
  .produto-nome { color: var(--muted); }
  .produto-pts { font-family: 'DM Mono', monospace; font-size: 11px; color: #f0f0f0; }
  .produto-pts.positivo { color: var(--bronze-color); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .sidebar       { animation: fadeUp .35s ease both; }
  .total-card    { animation: fadeUp .35s ease .06s both; }
  .metas-card    { animation: fadeUp .35s ease .12s both; }
  .produtos-card { animation: fadeUp .35s ease .18s both; }
  @keyframes pulse-bronze { 0%,100%{ box-shadow:0 0 20px rgba(220,160,20,0.1); } 50%{ box-shadow:0 0 32px rgba(220,160,20,0.22); } }
  @keyframes pulse-prata  { 0%,100%{ box-shadow:0 0 20px rgba(55,138,221,0.1); } 50%{ box-shadow:0 0 32px rgba(55,138,221,0.22); } }
  @keyframes pulse-ouro   { 0%,100%{ box-shadow:0 0 20px rgba(255,215,0,0.12); } 50%{ box-shadow:0 0 32px rgba(255,215,0,0.28); } }
  @keyframes pulse-platina{ 0%,100%{ box-shadow:0 0 20px rgba(200,200,220,0.1);} 50%{ box-shadow:0 0 32px rgba(200,200,220,0.22);} }
  .total-card.bronze { animation: fadeUp .35s ease .06s both, pulse-bronze 3s ease-in-out 1s infinite; }
  .total-card.prata  { animation: fadeUp .35s ease .06s both, pulse-prata  3s ease-in-out 1s infinite; }
  .total-card.ouro   { animation: fadeUp .35s ease .06s both, pulse-ouro   3s ease-in-out 1s infinite; }
  .total-card.platina{ animation: fadeUp .35s ease .06s both, pulse-platina 3s ease-in-out 1s infinite; }
</style>
</head>

    <div class="sidebar-divider"></div>
    <div class="sidebar-period" id="period-label">
      <span class="status-dot"></span>carregando...
    </div>
  </div>

  <div class="content">

    <div class="total-card fora" id="total-card">
      <div class="total-left">
        <div class="total-label">TOTAL DE PONTOS</div>
        <div class="total-value" id="total-val">—</div>
        <div class="medal-badge fora-b" id="medal-badge">—</div>
      </div>
      <div class="total-right">
        <div class="progress-track" style="position:relative;">
          <div class="p-fora"    style="width:63.6%"></div>
          <div class="p-bronze"  style="width:13.6%"></div>
          <div class="p-prata"   style="width:13.6%"></div>
          <div class="p-ouro"    style="width:0.9%"></div>
          <div class="p-platina" style="flex:1"></div>
          <div class="p-marker" id="total-marker" style="left:0%"></div>
        </div>
        <div class="progress-ticks">
          <span class="ptick">0</span>
          <span class="ptick">7k bronze</span>
          <span class="ptick">8,5k prata</span>
          <span class="ptick">10k ouro</span>
          <span class="ptick">10,1k+ platina</span>
        </div>
      </div>
    </div>

    <div class="metas-card">
      <div class="section-label">METAS DE PONTOS ADICIONAIS</div>
      <div class="arc-row">
        <div class="arc-item">
          <svg class="arc-svg" viewBox="0 0 120 68">
            <path d="M10 65 A50 50 0 0 1 110 65" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="10" stroke-linecap="butt"/>
            <path id="arc-lig" d="M10 65 A50 50 0 0 1 110 65" fill="none" stroke="#f5c842" stroke-width="10" stroke-linecap="butt"
              stroke-dasharray="157" stroke-dashoffset="157"/>
            <line id="marker-lig" x1="60" y1="15" x2="60" y2="5" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
          <div class="arc-value" id="lig-val" style="color:#f5c842">—</div>
          <div class="arc-label">Ligações / dia</div>
          <div class="arc-sub">meta: 50 → +1.000 pts</div>
        </div>
        <div class="arc-item">
          <svg class="arc-svg" viewBox="0 0 120 68">
            <path d="M10 65 A50 50 0 0 1 110 65" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="10" stroke-linecap="butt"/>
            <path id="arc-age" d="M10 65 A50 50 0 0 1 110 65" fill="none" stroke="#7ab8f5" stroke-width="10" stroke-linecap="butt"
              stroke-dasharray="157" stroke-dashoffset="157"/>
            <line id="marker-age" x1="60" y1="15" x2="60" y2="5" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
          <div class="arc-value" id="age-val" style="color:#7ab8f5">—</div>
          <div class="arc-label">Pts Agendamentos</div>
          <div class="arc-sub">teto: 2.000 pts</div>
        </div>
      </div>
    </div>

    <div class="produtos-card">
      <div class="section-label">FATURAMENTO COMERCIAL POR PRODUTO</div>
      <div class="produto-list" id="produto-list">
        <div style="color:var(--hint);font-size:11px;">carregando...</div>
      </div>
    </div>

  </div>
</div>

<script>
  const SHEET_ID   = "1_IwXgibR1io9ap79FukA3Ofm-hbrblghcY_XZFRENS4";
  const SHEET_NAME = "Nicole";
  const PRODUTOS   = ['RH Digital (Intermediador)', 'Suporte RH Digital (Intermediador)', 'Seven Saúde', 'VR Benefícios', 'Caju', 'Flash', 'Ifood Benefícios', 'Colab+', 'NMRR VExpenses', 'Implantação VExpenses', 'VR Premiação', 'VR Renegociação', 'VT', 'Auditório Seventech', 'Boas Festas', 'Moskit', 'Bem-estar', 'NMRR Pontomais'];

  function nivel(pts) {
    if (pts >= 10100) return 'platina';
    if (pts >= 10000) return 'ouro';
    if (pts >= 8500)  return 'prata';
    if (pts >= 7000)  return 'bronze';
    return 'fora';
  }
  function labelNivel(n) { return {platina:'Platina',ouro:'Ouro',prata:'Prata',bronze:'Bronze',fora:'Inelegível'}[n]; }
  function corNivel(n)   { return {platina:'var(--platina-color)',ouro:'var(--ouro-color)',prata:'var(--prata-color)',bronze:'var(--bronze-color)',fora:'var(--fora-color)'}[n]; }
  function markerPct(pts) { return Math.min(Math.max((pts/11000)*100,0.5),99).toFixed(1)+'%'; }
  function arcOffset(val,max) { return (157*(1-Math.min(Math.max(val/max,0),1))).toFixed(1); }
  function arcMarker(val,max) {
    const pct=Math.min(Math.max(val/max,0),1);
    const angle=-Math.PI+pct*Math.PI;
    const cx=60,cy=65,r=50;
    return `${(cx+r*Math.cos(angle)).toFixed(1)} ${(cy+r*Math.sin(angle)).toFixed(1)} ${(cx+(r-12)*Math.cos(angle)).toFixed(1)} ${(cy+(r-12)*Math.sin(angle)).toFixed(1)}`;
  }
  function toNum(v) {
    if (v===null||v===undefined) return 0;
    if (typeof v==='number') return v;
    return parseFloat(String(v).replace('%','').replace(',','.')) || 0;
  }

  async function fetchDados() {
    const label = document.getElementById('period-label');
    try {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}&range=A1:K19&headers=0`;
      const res  = await fetch(url);
      const text = await res.text();
      const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
      const rows = json.table.rows;

      const totalPts = toNum(rows[1]?.c[4]?.v);
      const ligMedia = toNum(rows[2]?.c[0]?.v);
      const ptsAge   = toNum(rows[3]?.c[2]?.v);

      const nv = nivel(totalPts);
      document.getElementById('total-card').className = 'total-card ' + nv;
      const valEl = document.getElementById('total-val');
      valEl.style.color = corNivel(nv);
      valEl.textContent = totalPts.toLocaleString('pt-BR');
      const badge = document.getElementById('medal-badge');
      badge.className = 'medal-badge ' + nv + '-b';
      badge.textContent = labelNivel(nv);
      document.getElementById('total-marker').style.left = markerPct(totalPts);

      const ligCor = ligMedia >= 50 ? '#4caf7d' : '#f5c842';
      document.getElementById('lig-val').textContent = ligMedia.toFixed(0);
      document.getElementById('lig-val').style.color = ligCor;
      const arcLig = document.getElementById('arc-lig');
      arcLig.setAttribute('stroke-dashoffset', arcOffset(ligMedia, 50));
      arcLig.setAttribute('stroke', ligCor);
      const [lx1,ly1,lx2,ly2] = arcMarker(ligMedia,50).split(' ');
      const ml = document.getElementById('marker-lig');
      ml.setAttribute('x1',lx1); ml.setAttribute('y1',ly1);
      ml.setAttribute('x2',lx2); ml.setAttribute('y2',ly2);

      const ageCor = ptsAge >= 2000 ? '#4caf7d' : '#7ab8f5';
      document.getElementById('age-val').textContent = ptsAge.toLocaleString('pt-BR') + ' pts';
      document.getElementById('age-val').style.color = ageCor;
      const arcAge = document.getElementById('arc-age');
      arcAge.setAttribute('stroke-dashoffset', arcOffset(ptsAge, 2000));
      arcAge.setAttribute('stroke', ageCor);
      const [ax1,ay1,ax2,ay2] = arcMarker(ptsAge,2000).split(' ');
      const ma = document.getElementById('marker-age');
      ma.setAttribute('x1',ax1); ma.setAttribute('y1',ay1);
      ma.setAttribute('x2',ax2); ma.setAttribute('y2',ay2);

      const lista = document.getElementById('produto-list');
      lista.innerHTML = '';
      for (let i=1; i<=18; i++) {
        const row = rows[i];
        if (!row) continue;
        const nome = row?.c[6]?.v || PRODUTOS[i-1] || '';
        const pts  = toNum(row?.c[10]?.v);
        if (!nome) continue;
        const div = document.createElement('div');
        div.className = 'produto-row';
        div.innerHTML = `<span class="produto-nome">${nome}</span><span class="produto-pts ${pts>0?'positivo':''}">${pts>0?pts.toLocaleString('pt-BR'):'—'}</span>`;
        lista.appendChild(div);
      }

      const agora = new Date();
      const hora  = agora.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      const mes   = agora.toLocaleString('pt-BR',{month:'long'});
      label.innerHTML = `<span class="status-dot"></span>atualizado às ${hora}<br>${mes.charAt(0).toUpperCase()+mes.slice(1)} ${agora.getFullYear()}`;

    } catch(e) {
      label.innerHTML = '<span class="status-dot" style="background:#f08080"></span>erro ao carregar';
      console.error(e);
    }
  }

  fetchDados();
  setInterval(() => location.reload(), 15*60*1000);
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') location.reload();
  });
</script>
</body>
</html>
