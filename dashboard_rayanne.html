<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Rayanne</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0d13; --surface: #13161f;
    --border: rgba(255,255,255,0.06);
    --muted: rgba(255,255,255,0.4); --hint: rgba(255,255,255,0.2);
    --bronze-color: #f5c842; --bronze-border: rgba(220,160,20,0.5);
    --prata-color: #7ab8f5; --prata-border: rgba(55,138,221,0.5);
    --ouro-color: #FFD700; --ouro-border: rgba(255,215,0,0.5);
    --platina-color: #e8e8f0; --platina-border: rgba(200,200,220,0.5);
    --fora-color: #f08080; --fora-border: rgba(220,70,70,0.3);
  }
  html, body { width:100%; height:100%; margin:0; padding:0; background:var(--bg); font-family:'DM Sans',sans-serif; color:#f0f0f0; -webkit-font-smoothing:antialiased; overflow:hidden; }
  .layout { display:grid; grid-template-columns:240px 1fr; width:100vw; height:100vh; }
  .sidebar { background:var(--surface); border-right:0.5px solid var(--border); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 24px; gap:18px; }
  .avatar { width:150px; height:150px; border-radius:50%; object-fit:cover; border:3px solid rgba(255,255,255,0.1); flex-shrink:0; }
  .sidebar-name { font-size:24px; font-weight:500; letter-spacing:-0.02em; text-align:center; }
  .sidebar-role { font-size:12px; color:var(--muted); text-align:center; line-height:1.5; }
  .sidebar-divider { width:32px; height:0.5px; background:var(--border); }
  .sidebar-period { font-size:11px; color:var(--hint); text-align:center; line-height:1.8; }
  .status-dot { width:7px; height:7px; border-radius:50%; background:#4caf7d; display:inline-block; margin-right:5px; box-shadow:0 0 6px rgba(76,175,125,0.6); }

  .main { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px; gap:36px; height:100vh; }

  .vendas-card {
    background:var(--surface);
    border:1.5px solid var(--border);
    border-radius:24px;
    padding:48px 80px;
    text-align:center;
    position:relative;
    overflow:hidden;
    min-width:560px;
  }
  .vendas-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
  .vendas-card.bronze { border-color:var(--bronze-border); background:rgba(220,160,20,0.06); }
  .vendas-card.bronze::before { background:linear-gradient(90deg,transparent,var(--bronze-color),transparent); }
  .vendas-card.prata { border-color:var(--prata-border); background:rgba(55,138,221,0.06); }
  .vendas-card.prata::before { background:linear-gradient(90deg,transparent,var(--prata-color),transparent); }
  .vendas-card.ouro { border-color:var(--ouro-border); background:rgba(255,215,0,0.06); }
  .vendas-card.ouro::before { background:linear-gradient(90deg,transparent,var(--ouro-color),transparent); }
  .vendas-card.platina { border-color:var(--platina-border); background:rgba(200,200,220,0.06); }
  .vendas-card.platina::before { background:linear-gradient(90deg,transparent,var(--platina-color),transparent); }
  .vendas-card.fora { border-color:var(--fora-border); }

  .vendas-label { font-size:13px; font-weight:500; letter-spacing:.12em; color:var(--muted); margin-bottom:12px; }
  .vendas-value { font-size:140px; font-weight:700; letter-spacing:-0.04em; line-height:1; font-family:'DM Mono',monospace; }
  .vendas-sub { font-size:16px; color:var(--muted); margin-top:4px; }
  .medal-badge { display:inline-flex; align-items:center; gap:8px; font-size:18px; font-weight:500; padding:8px 22px; border-radius:30px; margin-top:24px; }
  .medal-badge::before { content:''; width:9px; height:9px; border-radius:50%; }
  .bronze-b { background:rgba(220,160,20,0.14); color:var(--bronze-color); border:0.5px solid var(--bronze-border); }
  .bronze-b::before { background:var(--bronze-color); }
  .prata-b { background:rgba(55,138,221,0.14); color:var(--prata-color); border:0.5px solid var(--prata-border); }
  .prata-b::before { background:var(--prata-color); }
  .ouro-b { background:rgba(255,215,0,0.14); color:var(--ouro-color); border:0.5px solid var(--ouro-border); }
  .ouro-b::before { background:var(--ouro-color); }
  .platina-b { background:rgba(200,200,220,0.14); color:var(--platina-color); border:0.5px solid var(--platina-border); }
  .platina-b::before { background:var(--platina-color); }
  .fora-b { background:rgba(220,70,70,0.12); color:var(--fora-color); border:0.5px solid var(--fora-border); }
  .fora-b::before { background:var(--fora-color); }

  /* RANGE BAR */
  .range-section { width:100%; max-width:680px; }
  .range-track { width:100%; height:14px; border-radius:7px; display:flex; overflow:hidden; position:relative; margin-bottom:10px; }
  .r-empty { background:rgba(255,255,255,0.06); }
  .r-bronze { background:rgba(220,160,20,0.45); }
  .r-prata { background:rgba(55,138,221,0.5); }
  .r-ouro { background:rgba(255,215,0,0.55); }
  .r-platina { background:rgba(200,200,220,0.55); }
  .r-marker { position:absolute; top:-4px; width:3px; height:22px; background:#fff; border-radius:2px; transform:translateX(-50%); box-shadow:0 0 6px rgba(255,255,255,0.5); }
  .range-ticks { position:relative; height:38px; margin-top:10px; }
  .rtick { position:absolute; transform:translateX(-50%); font-size:11px; color:var(--hint); text-align:center; white-space:nowrap; }
  .rtick strong { display:block; font-size:13px; color:var(--muted); font-weight:500; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse-bronze { 0%,100%{ box-shadow:0 0 40px rgba(220,160,20,0.1); } 50%{ box-shadow:0 0 70px rgba(220,160,20,0.22); } }
  @keyframes pulse-prata { 0%,100%{ box-shadow:0 0 40px rgba(55,138,221,0.1); } 50%{ box-shadow:0 0 70px rgba(55,138,221,0.22); } }
  @keyframes pulse-ouro { 0%,100%{ box-shadow:0 0 40px rgba(255,215,0,0.12); } 50%{ box-shadow:0 0 70px rgba(255,215,0,0.28); } }
  @keyframes pulse-platina { 0%,100%{ box-shadow:0 0 40px rgba(200,200,220,0.1); } 50%{ box-shadow:0 0 70px rgba(200,200,220,0.22); } }
  .sidebar { animation:fadeUp .4s ease both; }
  .vendas-card { animation:fadeUp .4s ease .1s both; }
  .vendas-card.bronze { animation:fadeUp .4s ease .1s both, pulse-bronze 3s ease-in-out 1s infinite; }
  .vendas-card.prata { animation:fadeUp .4s ease .1s both, pulse-prata 3s ease-in-out 1s infinite; }
  .vendas-card.ouro { animation:fadeUp .4s ease .1s both, pulse-ouro 3s ease-in-out 1s infinite; }
  .vendas-card.platina { animation:fadeUp .4s ease .1s both, pulse-platina 3s ease-in-out 1s infinite; }
  .range-section { animation:fadeUp .4s ease .2s both; }
</style>
</head>

      <div class="vendas-label">VENDAS NO MÊS</div>

      <div class="medal-badge fora-b" id="medal-badge">—</div>
    </div>

    <div class="range-section">
      <div class="range-track">
        <div class="r-empty"   style="width:33.3%"></div>
        <div class="r-bronze"  style="width:20%"></div>
        <div class="r-prata"   style="width:13.3%"></div>
        <div class="r-ouro"    style="width:6.7%"></div>

      </div>
      <div class="range-ticks">

        <span class="rtick" style="left:66.7%"><strong>Ouro</strong>10</span>
        <span class="rtick" style="left:80%"><strong>Platina</strong>12+</span>
      </div>
    </div>
  </div>

<script>
  const SHEET_ID   = "1_IwXgibR1io9ap79FukA3Ofm-hbrblghcY_XZFRENS4";
  const SHEET_NAME = "Aquisição";
  const CELL_RANGE = "B4:B4";

  function nivel(v) {
    if (v >= 12) return 'platina';
    if (v >= 10) return 'ouro';
    if (v >= 8)  return 'prata';
    if (v >= 5)  return 'bronze';
    return 'fora';
  }
  function labelNivel(n) { return {platina:'Platina',ouro:'Ouro',prata:'Prata',bronze:'Bronze',fora:'Em progresso'}[n]; }
  function corNivel(n)   { return {platina:'var(--platina-color)',ouro:'var(--ouro-color)',prata:'var(--prata-color)',bronze:'var(--bronze-color)',fora:'var(--fora-color)'}[n]; }

  async function fetchDados() {
    const label = document.getElementById('period-label');
    try {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}&range=${CELL_RANGE}&headers=0`;
      const res  = await fetch(url);
      const text = await res.text();
      const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
      const vendas = Math.max(0, parseInt(json.table.rows[0]?.c[0]?.v ?? 0));

      const nv = nivel(vendas);
      document.getElementById('vendas-card').className = 'vendas-card ' + nv;
      const valEl = document.getElementById('vendas-val');
      valEl.style.color = corNivel(nv);
      valEl.textContent = vendas;
      const badge = document.getElementById('medal-badge');
      badge.className = 'medal-badge ' + nv + '-b';
      badge.textContent = labelNivel(nv);

      // marcador na barra (escala 0-15)
      const pct = Math.min(Math.max((vendas / 15) * 100, 0.5), 99).toFixed(1);
      document.getElementById('range-marker').style.left = pct + '%';

      const agora = new Date();
      const hora  = agora.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
      const mes   = agora.toLocaleString('pt-BR', {month:'long'});
      label.innerHTML = `<span class="status-dot"></span>atualizado às ${hora}<br>${mes.charAt(0).toUpperCase()+mes.slice(1)} ${agora.getFullYear()}`;

    } catch(e) {
      label.innerHTML = '<span class="status-dot" style="background:#f08080"></span>erro ao carregar';
      console.error(e);
    }
  }

  fetchDados();
  setInterval(() => location.reload(), 15 * 60 * 1000);
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') location.reload();
  });
</script>
