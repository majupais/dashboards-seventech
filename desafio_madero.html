<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desafio Madero — Seventech</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #0b0d13;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Sora', sans-serif;
    color: #fff;
    overflow: hidden;
  }

  #page {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 40px;
    transition: background 0.8s ease;
  }

  #page.meta-batida {
    background: radial-gradient(ellipse at center, #0a2e1a 0%, #0b0d13 70%);
  }

  /* Header */
  .header {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  #emoji {
    font-size: 56px;
    line-height: 1;
  }

  #title {
    font-size: clamp(26px, 3.5vw, 42px);
    font-weight: 800;
    color: #f5c842;
    letter-spacing: 0.02em;
  }

  .meta-batida #title { color: #3dffa0; }

  .subtitle {
    font-size: clamp(12px, 1.4vw, 16px);
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.06em;
  }

  /* Card central */
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: clamp(28px, 4vw, 48px) clamp(32px, 6vw, 80px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    box-shadow: 0 0 60px rgba(245,200,66,0.06);
    min-width: min(560px, 85vw);
  }

  .meta-batida .card {
    box-shadow: 0 0 60px rgba(61,255,160,0.08);
    border-color: rgba(61,255,160,0.15);
  }

  .card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }

  .count-row {
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  #count {
    font-size: clamp(80px, 13vw, 160px);
    font-weight: 800;
    line-height: 1;
    color: #f5c842;
    letter-spacing: -3px;
  }

  .meta-batida #count { color: #3dffa0; }

  .count-sep {
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 300;
    color: rgba(255,255,255,0.2);
    line-height: 1;
  }

  .count-meta {
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 700;
    color: rgba(245,200,66,0.3);
    line-height: 1;
    letter-spacing: -2px;
  }

  .meta-batida .count-meta { color: rgba(61,255,160,0.3); }

  #faltam {
    font-size: clamp(15px, 1.8vw, 22px);
    font-weight: 500;
    color: rgba(255,255,255,0.7);
    text-align: center;
  }

  #faltam span {
    color: #f5c842;
    font-weight: 800;
  }

  .meta-batida #faltam { color: #3dffa0; }

  /* Barra de progresso */
  .progress-section {
    width: min(600px, 82vw);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .progress-labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: rgba(255,255,255,0.25);
  }

  .progress-labels .meta-tag {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .progress-track {
    width: 100%;
    height: 12px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    overflow: hidden;
  }

  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #c8a000, #f5c842);
    border-radius: 99px;
    width: 0%;
    transition: width 1.2s cubic-bezier(.4,0,.2,1);
  }

  .meta-batida #progress-fill {
    background: linear-gradient(90deg, #00c97a, #3dffa0);
  }

  #progress-pct {
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.04em;
  }

  /* Status */
  .status {
    position: fixed;
    bottom: 18px;
    right: 22px;
    font-size: 11px;
    color: rgba(255,255,255,0.22);
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.03em;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #3dffa0;
    display: inline-block;
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    top: -20px;
    border-radius: 2px;
    animation: confetti-fall linear forwards;
    pointer-events: none;
    z-index: 999;
  }

  @keyframes confetti-fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<div id="page">
  <div class="header">
    <div id="emoji">🍔</div>
    <div id="title">Desafio Madero</div>
    <div class="subtitle">Time de Aquisição — Maio 2025</div>
  </div>

  <div class="card">
    <div class="card-label">Vendas Realizadas</div>
    <div class="count-row">
      <div id="count">—</div>
      <div class="count-sep">/</div>
      <div class="count-meta">30</div>
    </div>
    <div id="faltam">Carregando...</div>
  </div>

  <div class="progress-section">
    <div class="progress-labels">
      <span>0</span>
      <span class="meta-tag">🎯 Meta: 30 vendas</span>
    </div>
    <div class="progress-track">
      <div id="progress-fill"></div>
    </div>
    <div id="progress-pct">0% concluído</div>
  </div>
</div>

<div class="status" id="status"></div>

<script>
  const SUPABASE_URL = 'https://qnzpxcorujijvxcpcyvx.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFuenB4Y29ydWppdnhjcGN5dngiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0MjkxMjM3MCwiZXhwIjoyMDU4NDg4MzcwfQ.YBBqivqp_FaXDCvGblqBQP-8gNE_9yhWmtAxoR0PVTU';
  const META = 30;

  const updEl = document.getElementById('status');

  function criarConfetti() {
    const cores = ['#f5c842','#3dffa0','#ff6b6b','#74b9ff','#fd79a8','#a29bfe'];
    for (let i = 0; i < 120; i++) {
      const el = document.createElement('div');
      el.classList.add('confetti-piece');
      const size = Math.random() * 10 + 6;
      el.style.cssText = [
        'width:' + size + 'px',
        'height:' + (size * (Math.random() * 0.6 + 0.4)) + 'px',
        'left:' + (Math.random() * 100) + 'vw',
        'background:' + cores[Math.floor(Math.random() * cores.length)],
        'animation-duration:' + (Math.random() * 3 + 2.5) + 's',
        'animation-delay:' + (Math.random() * 2) + 's'
      ].join(';');
      document.body.appendChild(el);
      setTimeout(function() { el.remove(); }, 7000);
    }
  }

  async function fetchDados() {
    try {
      var url = SUPABASE_URL + '/rest/v1/desafio_madero?select=vendas&order=id.desc&limit=1';
      var res = await fetch(url, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY
        }
      });
      var data = await res.json();
      var vendas = parseInt((data[0] && data[0].vendas) || 0);
      var faltam = Math.max(0, META - vendas);
      var pct = Math.min((vendas / META) * 100, 100).toFixed(0);
      var batida = vendas >= META;
      var page = document.getElementById('page');

      document.getElementById('count').textContent = vendas;
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-pct').textContent = pct + '% concluído';

      if (batida) {
        page.classList.add('meta-batida');
        document.getElementById('emoji').textContent = '🎉';
        document.getElementById('title').textContent = 'META BATIDA!';
        document.getElementById('faltam').innerHTML = '🏆 Parabéns, time de Aquisição! Bora pro Madero!';
        criarConfetti();
      } else if (faltam === 1) {
        document.getElementById('faltam').innerHTML = 'Falta <span>1 venda</span> para o Madero! 🔥';
      } else {
        document.getElementById('faltam').innerHTML = 'Faltam <span>' + faltam + '</span> vendas para o Madero!';
      }

      var agora = new Date();
      var hora = agora.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
      updEl.innerHTML = '<span class="status-dot"></span>atualizado às ' + hora;

    } catch(e) {
      updEl.innerHTML = '<span class="status-dot" style="background:#f08080"></span>erro ao carregar';
      console.error(e);
    }
  }

  fetchDados();
  setInterval(function() { location.reload(); }, 15 * 60 * 1000);
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible') location.reload();
  });
</script>
</body>
</html>
