<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Bia</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0d13;
    --surface: #13161f;
    --border: rgba(255,255,255,0.06);
    --muted: rgba(255,255,255,0.35);
    --hint: rgba(255,255,255,0.18);
    --ok-color: #4cdf8a;
    --ok-bg: rgba(76,223,138,0.12);
    --ok-border: rgba(76,223,138,0.45);
    --fora-color: #f08080;
    --fora-bg: rgba(220,70,70,0.12);
    --fora-border: rgba(220,70,70,0.22);
    --ok-zone: rgba(76,223,138,0.4);
    --empty-zone: rgba(255,255,255,0.06);
  }
  html, body { width:100%; height:100%; margin:0; padding:0; background:var(--bg); font-family:'DM Sans',sans-serif; color:#f0f0f0; -webkit-font-smoothing:antialiased; overflow:hidden; }
  .layout { display:grid; grid-template-columns:220px 1fr; width:100vw; height:100vh; }
  .sidebar { background:var(--surface); border-right:0.5px solid var(--border); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 24px; gap:18px; }
  .avatar { width:148px; height:148px; border-radius:50%; object-fit:cover; border:3px solid rgba(255,255,255,0.1); flex-shrink:0; }
  .sidebar-name { font-size:22px; font-weight:500; letter-spacing:-0.02em; text-align:center; }
  .sidebar-role { font-size:12px; color:var(--muted); text-align:center; line-height:1.5; }
  .sidebar-divider { width:32px; height:0.5px; background:var(--border); }
  .sidebar-period { font-size:11px; color:var(--hint); text-align:center; line-height:1.8; }
  .status-dot { width:7px; height:7px; border-radius:50%; background:#4caf7d; display:inline-block; margin-right:5px; box-shadow:0 0 6px rgba(76,175,125,0.6); }
  .main { display:flex; flex-direction:column; justify-content:center; padding:28px 32px; gap:20px; height:100vh; overflow:hidden; }
  .section-label { font-size:9px; font-weight:500; letter-spacing:.1em; color:var(--hint); margin-bottom:10px; }
  .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .mcard { background:var(--surface); border:0.5px solid var(--border); border-radius:12px; padding:18px 20px; display:flex; flex-direction:column; gap:8px; position:relative; overflow:hidden; }
  .mcard::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
  .mcard.ok { background:rgba(76,223,138,0.07); border:1.5px solid var(--ok-border); box-shadow:0 0 24px rgba(76,223,138,0.14); }
  .mcard.ok::before { background:linear-gradient(90deg,transparent,var(--ok-color),transparent); }
  .mcard.fora { border:0.5px solid rgba(240,128,128,0.15); opacity:0.75; }
  .mlabel { font-size:9px; font-weight:500; letter-spacing:.07em; color:var(--muted); }
  .mvalue { font-size:48px; font-weight:300; letter-spacing:-0.03em; line-height:1; font-family:'DM Mono',monospace; }
  .mcard.ok .mvalue { font-weight:400; }
  .munit { font-size:18px; font-weight:300; color:var(--muted); margin-left:2px; font-family:'DM Sans',sans-serif; }
  .badge { display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:500; padding:3px 10px; border-radius:20px; width:fit-content; }
  .badge::before { content:''; width:5px; height:5px; border-radius:50%; }
  .ok-badge { background:var(--ok-bg); color:var(--ok-color); border:0.5px solid var(--ok-border); }
  .ok-badge::before { background:var(--ok-color); }
  .fora-badge { background:var(--fora-bg); color:var(--fora-color); border:0.5px solid var(--fora-border); }
  .fora-badge::before { background:var(--fora-color); }
  .objetivo-hint { font-size:10px; color:var(--hint); margin-top:2px; }
  .zbar-wrap { margin-top:auto; padding-top:12px; }
  .zbar { height:5px; border-radius:3px; display:flex; position:relative; margin-bottom:5px; }
  .zbar-inner { display:flex; width:100%; height:5px; border-radius:3px; overflow:hidden; }
  .z-ok { background:var(--ok-zone); }
  .z-empty { background:var(--empty-zone); }
  .zmarker { position:absolute; top:-5px; width:2.5px; height:15px; background:#fff; border-radius:2px; transform:translateX(-50%); box-shadow:0 0 5px rgba(255,255,255,0.35); }
  .zticks { display:flex; justify-content:space-between; }
  .ztick { font-size:9px; color:var(--hint); }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse-ok { 0%,100% { box-shadow:0 0 24px rgba(76,223,138,0.14); } 50% { box-shadow:0 0 36px rgba(76,223,138,0.28); } }
  .sidebar { animation:fadeUp .35s ease both; }
  .grid-3 .mcard:nth-child(1) { animation:fadeUp .35s ease .08s both; }
  .grid-3 .mcard:nth-child(2) { animation:fadeUp .35s ease .13s both; }
  .grid-3 .mcard:nth-child(3) { animation:fadeUp .35s ease .18s both; }
  .mcard.ok { animation:fadeUp .35s ease both, pulse-ok 3s ease-in-out 1s infinite; }
</style>
</head>

<script>
  const SHEET_ID   = "1_IwXgibR1io9ap79FukA3Ofm-hbrblghcY_XZFRENS4";
  const SHEET_NAME = "Bia";

  function toNum(v) {
    if (v === null || v === undefined) return 0;
    if (typeof v === 'number') return v;
    return parseFloat(String(v).replace('%','').replace(',','.')) || 0;
  }

  function toPct(v) {
    // Se o Google Sheets retornar como decimal (0.1 = 10%), converte
    if (typeof v === 'number' && v <= 1 && v >= 0) return v * 100;
    return toNum(v);
  }

  function applyMetric(prefix, ok, displayHTML, markerPct) {
    document.getElementById('card-' + prefix).className = 'mcard ' + (ok ? 'ok' : 'fora');
    const valEl = document.getElementById(prefix + '-val');
    valEl.style.color = ok ? 'var(--ok-color)' : 'var(--fora-color)';
    valEl.innerHTML = displayHTML;
    const badge = document.getElementById(prefix + '-badge');
    badge.className = 'badge ' + (ok ? 'ok' : 'fora') + '-badge';
    badge.textContent = ok ? 'Brilhante' : 'Fora do objetivo';
    document.getElementById(prefix + '-marker').style.left =
      Math.min(Math.max(markerPct, 0.5), 99).toFixed(1) + '%';
  }

  async function fetchDados() {
    const label = document.getElementById('period-label');
    try {
      // Busca só A3:A5 (satisfação, % avaliações, % no-show) — pula linha 1 e 2
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}&range=A3:A5&headers=0`;
      const res  = await fetch(url);
      const text = await res.text();
      const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
      const rows = json.table.rows;

      // range A3:A5 → rows[0]=A3, rows[1]=A4, rows[2]=A5
      const nota   = toNum(rows[0]?.c[0]?.v);   // A3 Satisfação no treinamento
      const aval   = toPct(rows[1]?.c[0]?.v);   // A4 % Avaliações treinamento
      const noshow = toPct(rows[2]?.c[0]?.v);   // A5 % no-show

      console.log('nota:', nota, 'aval:', aval, 'noshow:', noshow);

      applyMetric('nota',   nota >= 4.0,   nota.toFixed(1).replace('.',','),                           (nota / 5) * 100);
      applyMetric('noshow', noshow <= 20,  noshow.toFixed(2).replace('.',',') + '<span class="munit">%</span>', (noshow / 100) * 100);
      applyMetric('aval',   aval >= 50,    aval.toFixed(2).replace(".",",") + '<span class="munit">%</span>',          (aval / 100) * 100);

      const agora = new Date();
      const hora  = agora.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
      const mes   = agora.toLocaleString('pt-BR', {month:'long'});
      label.innerHTML = `<span class="status-dot"></span>atualizado às ${hora}<br>${mes.charAt(0).toUpperCase()+mes.slice(1)} ${agora.getFullYear()}`;

    } catch(e) {
      label.innerHTML = '<span class="status-dot" style="background:#f08080"></span>erro ao carregar';
      console.error('erro:', e);
    }
  }

  fetchDados();
  setInterval(() => location.reload(), 15 * 60 * 1000);
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') location.reload();
  });
</script>
