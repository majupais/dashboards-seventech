<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Karol</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0d13; --surface: #13161f;
    --border: rgba(255,255,255,0.06);
    --muted: rgba(255,255,255,0.35); --hint: rgba(255,255,255,0.18);
    --bronze-color: #c9895f; --bronze-bg: rgba(201,137,95,0.14); --bronze-border: rgba(201,137,95,0.5);
    --prata-color: #b9c3d1; --prata-bg: rgba(185,195,209,0.14); --prata-border: rgba(185,195,209,0.5);
    --ouro-color: #e8bb2e; --ouro-bg: rgba(232,187,46,0.14); --ouro-border: rgba(232,187,46,0.5);
    --platina-color: #7fd6e8; --platina-bg: rgba(127,214,232,0.14); --platina-border: rgba(127,214,232,0.5);
    --fora-color: #f08080; --fora-bg: rgba(220,70,70,0.12); --fora-border: rgba(220,70,70,0.22);
    --bronze-zone: rgba(201,137,95,0.4); --prata-zone: rgba(185,195,209,0.4); --ouro-zone: rgba(232,187,46,0.4); --platina-zone: rgba(127,214,232,0.45); --empty-zone: rgba(255,255,255,0.06);
  }
  html, body { width:100%; height:100%; margin:0; padding:0; background:var(--bg); font-family:'DM Sans',sans-serif; color:#f0f0f0; -webkit-font-smoothing:antialiased; overflow:hidden; }
  .layout { display:grid; grid-template-columns:220px 1fr; width:100vw; height:100vh; }
  .sidebar { background:var(--surface); border-right:0.5px solid var(--border); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 24px; gap:18px; }
  .avatar { width:148px; height:148px; border-radius:50%; object-fit:cover; border:3px solid rgba(255,255,255,0.1); flex-shrink:0; }
  .avatar-placeholder { width:148px; height:148px; border-radius:50%; border:3px solid rgba(255,255,255,0.1); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:56px; font-weight:300; color:var(--muted); background:rgba(255,255,255,0.03); }
  .sidebar-name { font-size:22px; font-weight:500; letter-spacing:-0.02em; text-align:center; }
  .sidebar-role { font-size:12px; color:var(--muted); text-align:center; line-height:1.5; }
  .sidebar-divider { width:32px; height:0.5px; background:var(--border); }
  .sidebar-period { font-size:11px; color:var(--hint); text-align:center; line-height:1.8; }
  .status-dot { width:7px; height:7px; border-radius:50%; background:#4caf7d; display:inline-block; margin-right:5px; box-shadow:0 0 6px rgba(76,175,125,0.6); }
  .main { display:flex; flex-direction:column; justify-content:center; padding:24px 28px; gap:16px; height:100vh; overflow:hidden; }
  .section-label { font-size:9px; font-weight:500; letter-spacing:.1em; color:var(--hint); margin-bottom:8px; }
  .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
  .grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .mcard.neutro { justify-content:center; }
  .mcard.neutro .mvalue { color:#f0f0f0; }
  .zbar-neutro { background:rgba(255,255,255,0.08); }
  .zbar-neutro-fill { background:rgba(255,255,255,0.35); border-radius:3px; height:5px; }
  .zline { position:absolute; top:-5px; width:2px; height:15px; background:rgba(255,255,255,0.4); transform:translateX(-50%); }
  .mcard { background:var(--surface); border:0.5px solid var(--border); border-radius:12px; padding:16px 18px; display:flex; flex-direction:column; gap:8px; position:relative; overflow:hidden; }
  .mcard::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
  .mcard.bronze { background:rgba(201,137,95,0.07); border:1.5px solid var(--bronze-border); box-shadow:0 0 24px rgba(201,137,95,0.12); }
  .mcard.bronze::before { background:linear-gradient(90deg,transparent,var(--bronze-color),transparent); }
  .mcard.prata { background:rgba(185,195,209,0.08); border:1.5px solid var(--prata-border); box-shadow:0 0 24px rgba(185,195,209,0.15); }
  .mcard.prata::before { background:linear-gradient(90deg,transparent,var(--prata-color),transparent); }
  .mcard.ouro { background:rgba(232,187,46,0.07); border:1.5px solid var(--ouro-border); box-shadow:0 0 24px rgba(232,187,46,0.12); }
  .mcard.ouro::before { background:linear-gradient(90deg,transparent,var(--ouro-color),transparent); }
  .mcard.platina { background:rgba(127,214,232,0.08); border:1.5px solid var(--platina-border); box-shadow:0 0 24px rgba(127,214,232,0.16); }
  .mcard.platina::before { background:linear-gradient(90deg,transparent,var(--platina-color),transparent); }
  .mcard.fora { border:0.5px solid rgba(240,128,128,0.15); opacity:0.7; }
  .mlabel { font-size:9px; font-weight:500; letter-spacing:.07em; color:var(--muted); }
  .mvalue { font-size:44px; font-weight:300; letter-spacing:-0.03em; line-height:1; font-family:'DM Mono',monospace; }
  .mcard.prata .mvalue, .mcard.bronze .mvalue, .mcard.ouro .mvalue, .mcard.platina .mvalue { font-weight:400; }
  .munit { font-size:18px; font-weight:300; color:var(--muted); margin-left:2px; font-family:'DM Sans',sans-serif; }
  .badge { display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:500; padding:3px 10px; border-radius:20px; width:fit-content; }
  .badge::before { content:''; width:5px; height:5px; border-radius:50%; }
  .bronze-badge { background:var(--bronze-bg); color:var(--bronze-color); border:0.5px solid var(--bronze-border); }
  .bronze-badge::before { background:var(--bronze-color); }
  .prata-badge { background:var(--prata-bg); color:var(--prata-color); border:0.5px solid var(--prata-border); }
  .prata-badge::before { background:var(--prata-color); }
  .ouro-badge { background:var(--ouro-bg); color:var(--ouro-color); border:0.5px solid var(--ouro-border); }
  .ouro-badge::before { background:var(--ouro-color); }
  .platina-badge { background:var(--platina-bg); color:var(--platina-color); border:0.5px solid var(--platina-border); }
  .platina-badge::before { background:var(--platina-color); }
  .fora-badge { background:var(--fora-bg); color:var(--fora-color); border:0.5px solid var(--fora-border); }
  .fora-badge::before { background:var(--fora-color); }
  .zbar-wrap { margin-top:auto; padding-top:10px; }
  .zbar { height:5px; border-radius:3px; display:flex; position:relative; margin-bottom:5px; }
  .zbar-inner { display:flex; width:100%; height:5px; border-radius:3px; overflow:hidden; }
  .z-bronze { background:var(--bronze-zone); }
  .z-prata { background:var(--prata-zone); }
  .z-ouro { background:var(--ouro-zone); }
  .z-platina { background:var(--platina-zone); }
  .z-empty { background:var(--empty-zone); }
  .zmarker { position:absolute; top:-5px; width:2.5px; height:15px; background:#fff; border-radius:2px; transform:translateX(-50%); box-shadow:0 0 5px rgba(255,255,255,0.35); }
  .zticks { display:flex; justify-content:space-between; }
  .ztick { font-size:9px; color:var(--hint); }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse-bronze { 0%,100% { box-shadow:0 0 24px rgba(201,137,95,0.12); } 50% { box-shadow:0 0 36px rgba(201,137,95,0.22); } }
  @keyframes pulse-prata { 0%,100% { box-shadow:0 0 24px rgba(185,195,209,0.15); } 50% { box-shadow:0 0 36px rgba(185,195,209,0.28); } }
  @keyframes pulse-ouro { 0%,100% { box-shadow:0 0 24px rgba(232,187,46,0.12); } 50% { box-shadow:0 0 36px rgba(232,187,46,0.24); } }
  @keyframes pulse-platina { 0%,100% { box-shadow:0 0 24px rgba(127,214,232,0.16); } 50% { box-shadow:0 0 40px rgba(127,214,232,0.32); } }
  .sidebar { animation:fadeUp .35s ease both; }
  .grid-2 .mcard:nth-child(1) { animation:fadeUp .35s ease .08s both; }
  .grid-2 .mcard:nth-child(2) { animation:fadeUp .35s ease .13s both; }
  .mcard.bronze { animation:fadeUp .35s ease both, pulse-bronze 3s ease-in-out 1s infinite; }
  .mcard.prata { animation:fadeUp .35s ease both, pulse-prata 3s ease-in-out 1s infinite; }
  .mcard.ouro { animation:fadeUp .35s ease both, pulse-ouro 3s ease-in-out 1s infinite; }
  .mcard.platina { animation:fadeUp .35s ease both, pulse-platina 3s ease-in-out 1s infinite; }
</style>
</head>

<script>
  const SHEET_ID   = "19Sb8OnFC4fdCvIFP0_eu7xxccS0o07_fQQRl-xSi4HM";
  const SHEET_NAME = "Respostas Karol";

  function nivelC1(v) { return v >= 80 ? 'platina' : v >= 70 ? 'ouro' : v >= 60 ? 'prata' : v >= 50 ? 'bronze' : 'fora'; }
  function nivelC2(v) { return v >= 10 ? 'platina' : v >= 7  ? 'ouro' : v >= 5  ? 'prata' : v >= 3  ? 'bronze' : 'fora'; }

  function corNivel(n) {
    return n==='platina' ? 'var(--platina-color)' : n==='ouro' ? 'var(--ouro-color)' : n==='prata' ? 'var(--prata-color)' : n==='bronze' ? 'var(--bronze-color)' : 'var(--fora-color)';
  }
  function labelNivel(n) {
    return n==='platina' ? 'Platina' : n==='ouro' ? 'Ouro' : n==='prata' ? 'Prata' : n==='bronze' ? 'Bronze' : 'Fora da meta';
  }
  function markerPos(v, max) { return Math.min(Math.max((v/max)*100, 0.5), 99).toFixed(1) + '%'; }

  function toNum(v) {
    if (v === null || v === undefined) return 0;
    if (typeof v === 'number') return v;
    return parseFloat(String(v).replace('%','').replace(',','.')) || 0;
  }

  function parseSheetDate(cell) {
    if (!cell) return null;
    if (cell.f) {
      const m = cell.f.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if (m) return new Date(+m[3], +m[2]-1, +m[1]);
    }
    if (typeof cell.v === 'string' && cell.v.indexOf('Date(') === 0) {
      const m = cell.v.match(/Date\((\d+),(\d+),(\d+)/);
      if (m) return new Date(+m[1], +m[2], +m[3]);
    }
    if (typeof cell.v === 'string') {
      const m = cell.v.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if (m) return new Date(+m[3], +m[2]-1, +m[1]);
    }
    return null;
  }

  function applyMetric(prefix, nivel, displayHTML, max, valor) {
    const card  = document.getElementById('card-' + prefix);
    const valEl = document.getElementById(prefix + '-val');
    const badge = document.getElementById(prefix + '-badge');
    card.className  = 'mcard ' + nivel;
    valEl.style.color = corNivel(nivel);
    valEl.innerHTML = displayHTML;
    badge.className = 'badge ' + nivel + '-badge';
    badge.textContent = labelNivel(nivel);
    document.getElementById(prefix + '-marker').style.left = markerPos(valor, max);
  }

  async function fetchDados() {
    const label = document.getElementById('period-label');
    try {
      // Aba "Respostas Karol": A=Carimbo, B=Nome, C=Data, D=Qtd leads, E=Vendas feitas
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}&range=A2:E1000&headers=0`;
      const res  = await fetch(url);
      const text = await res.text();
      const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
      const rows = json.table.rows || [];

      const now = new Date();
      const leadsVals = [];
      let vendasTotal = 0;

      rows.forEach(row => {
        const c = row.c || [];
        const date = parseSheetDate(c[2]);
        if (!date) return;
        if (date.getMonth() !== now.getMonth() || date.getFullYear() !== now.getFullYear()) return;
        const leadsCell = c[3];
        const vendasCell = c[4];
        if (leadsCell && leadsCell.v !== null && leadsCell.v !== undefined) leadsVals.push(toNum(leadsCell.v));
        if (vendasCell && vendasCell.v !== null && vendasCell.v !== undefined) vendasTotal += toNum(vendasCell.v);
      });

      const avgLeads = leadsVals.length ? (leadsVals.reduce((a,b)=>a+b,0) / leadsVals.length) : 0;

      applyMetric('c1', nivelC1(avgLeads), avgLeads.toFixed(1).replace('.',','), 90, avgLeads);
      applyMetric('c2', nivelC2(vendasTotal), String(Math.round(vendasTotal)), 12, vendasTotal);

      const agora = new Date();
      const hora  = agora.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
      const mes   = agora.toLocaleString('pt-BR', {month:'long'});
      label.innerHTML = `<span class="status-dot"></span>atualizado às ${hora}<br>${mes.charAt(0).toUpperCase()+mes.slice(1)} ${agora.getFullYear()}`;

    } catch(e) {
      label.innerHTML = '<span class="status-dot" style="background:#f08080"></span>erro ao carregar';
      console.error(e);
    }
  }

  fetchDados();
  setInterval(() => location.reload(), 15 * 60 * 1000);
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') location.reload();
  });
</script>
